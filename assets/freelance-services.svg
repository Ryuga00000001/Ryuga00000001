<svg width="1100" height="330" viewBox="0 0 1100 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Freelance Services">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1100" height="330" rx="22" fill="url(#bg)"/>
  <text x="48" y="58" fill="#E2E8F0" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Freelance Services</text>
  <text x="48" y="88" fill="#94A3B8" font-size="16" font-family="Arial, Helvetica, sans-serif">Production-focused solutions for startup and business clients</text>

  <rect x="40" y="118" width="320" height="78" rx="14" fill="url(#card)" stroke="#22C55E" stroke-opacity="0.55"/>
  <text x="62" y="150" fill="#F8FAFC" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">Business Websites</text>
  <text x="62" y="172" fill="#9CA3AF" font-size="14" font-family="Arial, Helvetica, sans-serif">Landing pages, company sites, and conversion UX</text>

  <rect x="390" y="118" width="320" height="78" rx="14" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.6"/>
  <text x="412" y="150" fill="#F8FAFC" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">Dashboards and Admin</text>
  <text x="412" y="172" fill="#9CA3AF" font-size="14" font-family="Arial, Helvetica, sans-serif">Internal tools, analytics, and workflow control</text>

  <rect x="740" y="118" width="320" height="78" rx="14" fill="url(#card)" stroke="#A855F7" stroke-opacity="0.6"/>
  <text x="762" y="150" fill="#F8FAFC" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">E-commerce Systems</text>
  <text x="762" y="172" fill="#9CA3AF" font-size="14" font-family="Arial, Helvetica, sans-serif">Catalog, cart, checkout, and order processing</text>

  <rect x="40" y="214" width="495" height="78" rx="14" fill="url(#card)" stroke="#06B6D4" stroke-opacity="0.6"/>
  <text x="62" y="246" fill="#F8FAFC" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">API Integrations and Automation</text>
  <text x="62" y="268" fill="#9CA3AF" font-size="14" font-family="Arial, Helvetica, sans-serif">Payments, third-party APIs, and custom workflow automation</text>

  <rect x="565" y="214" width="495" height="78" rx="14" fill="url(#card)" stroke="#F97316" stroke-opacity="0.65"/>
  <text x="587" y="246" fill="#F8FAFC" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">Performance and Refactoring</text>
  <text x="587" y="268" fill="#9CA3AF" font-size="14" font-family="Arial, Helvetica, sans-serif">Speed optimization, maintainability, and code cleanup</text>
</svg>
